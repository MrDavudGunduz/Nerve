# ─── SwiftLint Configuration for Nerve ─────────────────────────────────────
# https://github.com/realm/SwiftLint

# ── Included / Excluded ──────────────────────────────────────────────────────

included:
  - Nerve
  - Packages

excluded:
  - Packages/*/.build
  - Packages/*/.swiftpm
  - "**/.build"
  - DerivedData

# ── Opt-In Rules ─────────────────────────────────────────────────────────────

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - last_where
  - legacy_multiple
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# ── Disabled Rules ───────────────────────────────────────────────────────────
# These are intentionally disabled for this project's coding style.

disabled_rules:
  - trailing_comma          # We use trailing commas for diff-friendly diffs.
  - opening_brace           # Conflicts with SwiftFormat's brace style.
  - todo                    # TODOs are tracked; warnings are noise.

# ── Rule Configuration ───────────────────────────────────────────────────────

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 7
  error: 10

type_name:
  min_length: 3
  max_length: 50
  allowed_symbols: ["_"]

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - a
    - b

nesting:
  type_level: 3
  function_level: 5

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 3
  error: 4

# ── Reporter ─────────────────────────────────────────────────────────────────

reporter: "xcode"
